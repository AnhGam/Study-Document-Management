name: Release

on:
  push:
    tags:
      - "v*"

env:
  SOLUTION_FILE: study-document-manager.sln
  BUILD_CONFIGURATION: Release
  APP_NAME: StudyDocumentManager

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: msbuild ${{ env.SOLUTION_FILE }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /t:Rebuild

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $outputDir = "study-document-manager/bin/Release"
          $zipName = "${{ env.APP_NAME }}_v${version}_Portable.zip"

          # Remove debug files before zipping
          Remove-Item "$outputDir/*.pdb" -ErrorAction SilentlyContinue
          Remove-Item "$outputDir/*.xml" -ErrorAction SilentlyContinue

          Compress-Archive -Path "$outputDir/*" -DestinationPath $zipName -Force
          echo "PORTABLE_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Download and setup Inno Setup
        shell: pwsh
        run: |
          $innoUrl = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile "innosetup.exe"
          Start-Process -FilePath "innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $oldName = "StudyDocumentManager_v2.0.0_Setup.exe"
          $newName = "${{ env.APP_NAME }}_v${version}_Setup.exe"
          if (Test-Path $oldName) {
            Rename-Item -Path $oldName -NewName $newName
          } elseif (Test-Path "installer/$oldName") {
            Copy-Item "installer/$oldName" $newName
          }
          echo "SETUP_EXE=$newName" >> $env:GITHUB_ENV

      - name: Generate release notes
        id: release_notes
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges | head -20)
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -10)
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}"
          fi

          # Create release notes
          cat << EOF > release_notes.md
          ## What's New

          $COMMITS

          ## Downloads

          | Platform | Download |
          |----------|----------|
          | Windows (Installer) | \`${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Setup.exe\` |
          | Windows (Portable) | \`${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Portable.zip\` |

          ## System Requirements

          - Windows 7 SP1 or later
          - .NET Framework 4.8

          ## Full Changelog

          $COMPARE_URL
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Study Document Manager ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            ${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Setup.exe
            ${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Discord Notification
    needs: release
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Discord notification (release)
        if: ${{ needs.release.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"🚀 Study Document Manager ${{ github.ref_name }} Released!\", \"description\": \"New version available for download.\n\n[Download on GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})\", \"color\": 5793266}]}" \
              $DISCORD_WEBHOOK
          fi

      - name: Discord notification (failure)
        if: ${{ needs.release.result == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"❌ Study Document Manager Release Failed\", \"description\": \"**Tag:** \`${{ github.ref_name }}\`\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
              $DISCORD_WEBHOOK
          fi
