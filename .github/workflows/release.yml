name: Release

on:
  push:
    tags:
      - "v*"

env:
  APP_NAME: StudyDocumentManager

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Verify pre-built files exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SETUP="installer/${{ env.APP_NAME }}_v${VERSION}_Setup.exe"
          PORTABLE="installer/${{ env.APP_NAME }}_v${VERSION}_Portable.zip"

          if [ ! -f "$SETUP" ]; then
            echo "ERROR: $SETUP not found!"
            echo "Please build the installer locally before creating the tag."
            exit 1
          fi

          if [ ! -f "$PORTABLE" ]; then
            echo "ERROR: $PORTABLE not found!"
            echo "Please create the portable zip locally before creating the tag."
            exit 1
          fi

          echo "Found installer files:"
          ls -la installer/

      - name: Generate release notes
        id: release_notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges | head -20)
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -10)
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}"
          fi

          # Create release notes
          cat << EOF > release_notes.md
          ## What's New

          $COMMITS

          ## Downloads

          | Platform | Download |
          |----------|----------|
          | Windows (Installer) | \`${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Setup.exe\` |
          | Windows (Portable) | \`${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Portable.zip\` |

          ## System Requirements

          - Windows 7 SP1 or later
          - .NET Framework 4.8

          ## Full Changelog

          $COMPARE_URL
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            installer/${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Setup.exe
            installer/${{ env.APP_NAME }}_v${{ steps.version.outputs.version }}_Portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Discord Notification
    needs: release
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Discord notification (release)
        if: ${{ needs.release.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Study Document Manager ${{ github.ref_name }} Released!\", \"description\": \"New version available for download.\n\n[Download on GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})\", \"color\": 5793266}]}" \
              $DISCORD_WEBHOOK
          fi

      - name: Discord notification (failure)
        if: ${{ needs.release.result == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Study Document Manager Release Failed\", \"description\": \"**Tag:** \`${{ github.ref_name }}\`\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
              $DISCORD_WEBHOOK
          fi
