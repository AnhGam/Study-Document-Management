name: Sync Dev After Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [Production]

jobs:
  sync-dev:
    # Only run if Release workflow succeeded on Production branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'Production' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync development with Production
        run: |
          git fetch origin Production development
          git checkout development

          # Attempt merge, handle version conflicts by taking Production's versions
          if ! git merge origin/Production --no-edit -m "chore(sync): merge Production into development after release [skip ci]"; then
            echo "Merge conflicts detected, resolving version files..."

            # For version files, take Production's version (new stable base)
            for file in study-document-manager/Properties/AssemblyInfo.cs setup.iss CHANGELOG.md; do
              if git diff --name-only --diff-filter=U | grep -q "^${file}$"; then
                git checkout --theirs "$file"
                git add "$file"
              fi
            done

            # Complete the merge
            git commit --no-edit
          fi

          git push origin development

      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"🔄 Dev Synced with Production\", \"description\": \"Development branch has been automatically synced after release.\", \"color\": 3447003}]}" \
              $DISCORD_WEBHOOK
          fi
