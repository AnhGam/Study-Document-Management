name: Sync Dev After Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  sync-dev:
    name: Sync Development with Production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync development with Production
        run: |
          git fetch origin Production development
          git checkout development

          # Attempt merge, handle version conflicts
          if ! git merge origin/Production --no-edit -m "chore(sync): merge Production into development after release [skip ci]"; then
            echo "Merge conflicts detected, resolving version files..."

            # For version files, take Production's version
            for file in Properties/AssemblyInfo.cs setup.iss VERSION CHANGELOG.md; do
              if git diff --name-only --diff-filter=U | grep -q "^${file}$"; then
                git checkout --theirs "$file"
                git add "$file"
              fi
            done

            git commit --no-edit || echo "No changes to commit"
          fi

          git push origin development

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Dev Synced\", \"description\": \"Development branch synced with Production after release.\", \"color\": 3447003}]}" \
              $DISCORD_WEBHOOK
          fi

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Sync Failed\", \"description\": \"Failed to sync development with Production.\\n\\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
              $DISCORD_WEBHOOK
          fi
