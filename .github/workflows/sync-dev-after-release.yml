name: Sync After Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  merge-to-production:
    name: Merge Development to Production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge development into Production
        run: |
          git fetch origin development Production

          # Checkout Production branch
          git checkout Production

          # Merge development into Production
          if ! git merge origin/development --no-edit -m "chore(sync): merge development into Production after release [skip ci]"; then
            echo "Merge conflicts detected, attempting to resolve..."

            # For version files, take development's version (the latest)
            for file in Properties/AssemblyInfo.cs setup.iss VERSION CHANGELOG.md; do
              if git diff --name-only --diff-filter=U | grep -q "^${file}$"; then
                git checkout --theirs "$file"
                git add "$file"
              fi
            done

            # For installer files, take development's version
            if git diff --name-only --diff-filter=U | grep -q "^installer/"; then
              git checkout --theirs installer/
              git add installer/
            fi

            git commit --no-edit || echo "No changes to commit"
          fi

          git push origin Production

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Production Synced\", \"description\": \"Development branch merged into Production after release.\", \"color\": 3066993}]}" \
              $DISCORD_WEBHOOK
          fi

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Sync Failed\", \"description\": \"Failed to merge development into Production.\\n\\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
              $DISCORD_WEBHOOK
          fi