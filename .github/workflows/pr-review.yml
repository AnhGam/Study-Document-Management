name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          # Get list of changed files
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -v -E '\.(lock|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$' | head -50)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR diff
        id: diff
        run: |
          # Get diff content (limited to prevent token overflow)
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -2000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Review with Gemini
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Skip if no API key
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "No Gemini API key found, skipping review"
            exit 0
          fi

          # Prepare the prompt
          SYSTEM_PROMPT="You are a senior C# developer reviewing code for a WinForms .NET Framework 4.8 desktop application. This is a Study Document Manager app using SQLite database.

          Review Guidelines:
          - Focus on code quality, potential bugs, and security issues
          - Check for proper resource disposal (IDisposable pattern)
          - Verify database connections are properly closed
          - Look for potential null reference exceptions
          - Check UI/UX consistency with existing patterns
          - Suggest improvements but be concise
          - Use bullet points for clarity
          - If the changes look good, simply approve with a brief positive note

          Response format:
          ## Summary
          [1-2 sentence overview]

          ## Issues Found (if any)
          - [issue description]

          ## Suggestions (if any)
          - [suggestion]

          ## Verdict
          [APPROVE/REQUEST_CHANGES/COMMENT] - [brief reason]"

          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          CHANGED_FILES="${{ steps.changed-files.outputs.files }}"
          DIFF_CONTENT="${{ steps.diff.outputs.diff }}"

          USER_PROMPT="Review this Pull Request:

          **Title:** $PR_TITLE

          **Description:** $PR_BODY

          **Changed Files:**
          $CHANGED_FILES

          **Diff:**
          \`\`\`diff
          $DIFF_CONTENT
          \`\`\`"

          # Call Gemini API
          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg user "$USER_PROMPT" \
              '{
                "system_instruction": {"parts": [{"text": $system}]},
                "contents": [{"parts": [{"text": $user}]}],
                "generationConfig": {
                  "temperature": 0.3,
                  "maxOutputTokens": 2048
                }
              }')")

          # Extract the review text
          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Unable to generate review"')

          # Save to file for the next step
          echo "$REVIEW" > review.md

          # Output for debugging
          echo "Review generated successfully"

      - name: Post review comment
        if: ${{ env.GEMINI_API_KEY != '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f review.md ]; then
            # Add header to the review
            COMMENT="## AI Code Review

          $(cat review.md)

          ---
          *Automated review by Gemini AI*"

            # Post comment to PR
            gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
          fi

      - name: Discord notification (new PR)
        if: github.event.action == 'opened'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"New Pull Request #${{ github.event.pull_request.number }}\", \"description\": \"**${{ github.event.pull_request.title }}**\n\nBy: ${{ github.event.pull_request.user.login }}\n\n[View PR](${{ github.event.pull_request.html_url }})\", \"color\": 3447003}]}" \
              $DISCORD_WEBHOOK
          fi
