name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm promotion to Production"
        required: true
        default: ""

jobs:
  promote:
    name: Merge Development to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge development into Production
        run: |
          git fetch origin development Production
          git checkout Production
          git merge origin/development --no-edit -m "chore: merge development into Production for release"
          git push origin Production

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Promotion Complete\", \"description\": \"Development has been merged into Production.\\n\\nReady for release tag.\", \"color\": 3066993}]}" \
              $DISCORD_WEBHOOK
          fi

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"Promotion Failed\", \"description\": \"Failed to merge development into Production.\\n\\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
              $DISCORD_WEBHOOK
          fi
