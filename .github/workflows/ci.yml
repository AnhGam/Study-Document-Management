name: CI

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]

env:
  SOLUTION_FILE: study-document-manager.sln
  PROJECT_FILE: study-document-manager/study-document-manager.csproj
  BUILD_CONFIGURATION: Release

jobs:
  check:
    name: Check & Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: msbuild ${{ env.SOLUTION_FILE }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /t:Rebuild /warnaserror-

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: |
            study-document-manager/bin/Release/
            !study-document-manager/bin/Release/*.pdb
            !study-document-manager/bin/Release/*.xml
          retention-days: 7

  notify:
    name: Discord Notification
    needs: check
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push'

    steps:
      - name: Discord notification (success)
        if: ${{ needs.check.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"✅ Study Document Manager Build Passed\", \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** ${{ github.actor }}\n\n📦 Artifacts ready for download\", \"color\": 3066993}]}" \
              $DISCORD_WEBHOOK
          fi

      - name: Discord notification (failure)
        if: ${{ needs.check.result == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"❌ Study Document Manager Build Failed\", \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** ${{ github.actor }}\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
              $DISCORD_WEBHOOK
          fi
